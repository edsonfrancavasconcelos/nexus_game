<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raptor Strike: Heavy Fire Edition</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020208">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div id="ui">
        SCORE: <span id="score-val">0</span>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        LEVEL: <span id="level-val">1</span>
    </div>
    
    <div id="overlay">
        <div class="overlay-blur-effect"></div>
        <div class="menu-content">
            <h2 class="brand-sub">HEAVY FIRE EDITION</h2>
            <div class="logo-container">
                <span class="logo-text">RAPTOR</span>
                <span class="logo-text highlight">STRIKE</span>
            </div>
            <p class="game-lore">Pilote no limite do espaço profundo. Sobreviva à investida alienígena.</p>
            <button id="start-btn">LIGAR MOTORES DA NAVE</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-area">
            <div id="stick"></div>
        </div>
    </div>

    <div id="nexusSelector">
    <div class="nexus-title">
        🛸 NEXUS: SELETOR DE ZONA
    </div>

    <select id="debugLevelSelect">
        <option value="1">ZONA 01: SETOR ALPHA</option>
        <option value="21">ZONA 21: GIGANTES TIPO 05</option>
        <option value="31">ZONA 31: GIGANTES TIPO 10</option>
        <option value="51">ZONA 51: GIGANTES TIPO 15</option>
    </select>

    <div class="nexus-status">
        SISTEMA DE TESTE DE NÍVEIS ATIVO
    </div>
</div>

    <div id="cockpit-ui">
        <button id="btnMissile" class="control-btn">
            <img src="/assets/img/missel.png" alt="Míssil" style="width: 55%; height: 55%; pointer-events: none;">
        </button>
        
        <button id="btnPDC" class="control-btn">
            <img src="/assets/img/pdc.png" alt="PDC" style="width: 55%; height: 55%; pointer-events: none;">
        </button>
        
        <button id="btnShoot" class="control-btn">
            <img src="/assets/img/atirar.png" alt="Atirar" style="width: 60%; height: 60%; pointer-events: none;">
        </button>
        
        <button id="btnPause" class="control-btn">
            <img src="/assets/img/pause.png" alt="Pausar" style="width: 50%; height: 50%; pointer-events: none;">
        </button>
    </div>

    <script type="module" src="/src/index.js"></script>
</body>
</html>
